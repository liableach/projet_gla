<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultat de recherche - TouTou</title>
    <link rel="stylesheet" href="recherche.css" />
</head>

<body>
<div class="search-page">

    <header class="topbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="TouTou Logo" />
        </a>

        <nav class="menu">
            <a href="index.html">ACCUEIL</a>
            <a href="mytickets.html">MES BILLETS</a>

            <a href="login.html" class="user-avatar">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>
    </header>

    <main class="search-layout">

        <section class="left-panel">

            <h1>Résultat de recherche</h1>

            <form id="searchForm" class="mini-search">
                <div class="mini-inputs">
                    <div class="mini-field">
                        <label for="fromField">Départ</label>
                        <input
                                id="fromField"
                                type="text"
                                placeholder="Ex: Paris"
                        />
                    </div>

                    <div class="mini-field">
                        <label for="toField">Arrivée</label>
                        <input
                                id="toField"
                                type="text"
                                placeholder="Ex: Lyon"
                        />
                    </div>
                </div>

                <button type="submit">Rechercher</button>
            </form>

            <div class="selected-date-label" id="selectedDateLabel">
                Date sélectionnée : -
            </div>

            <div class="days-selector">
                <button class="day-arrow" id="prevDaysBtn">‹</button>
                <div id="daysContainer" class="days-container"></div>
                <button class="day-arrow" id="nextDaysBtn">›</button>
            </div>

        </section>

        <section class="right-panel">

            <div class="right-header">
                <h2>Trains disponibles</h2>
                <span class="train-count">Chargement...</span>
            </div>

            <div id="trainsList" class="trains-list"></div>

        </section>

    </main>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    let from = params.get("from") || "";
    let to = params.get("to") || "";

    const fromField = document.getElementById("fromField");
    const toField = document.getElementById("toField");
    const trainsList = document.getElementById("trainsList");
    const trainCount = document.querySelector(".train-count");
    const selectedDateLabel = document.getElementById("selectedDateLabel");

    fromField.value = from;
    toField.value = to;

    const dayLabels = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

    function parseDate() {
        const raw = params.get("date") || params.get("depart");

        if (raw) {
            const parsed = new Date(raw);

            if (!isNaN(parsed.getTime())) {
                parsed.setHours(0, 0, 0, 0);
                return parsed;
            }
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return today;
    }

    let selectedDate = parseDate();

    function formatDateForUrl(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
    }

    function updateDateLabel() {
        selectedDateLabel.textContent =
            "Date sélectionnée : " +
            selectedDate.toLocaleDateString("fr-FR", {
                weekday: "long",
                day: "2-digit",
                month: "long",
                year: "numeric"
            });
    }

    function isSameDay(dateA, dateB) {
        return dateA.getFullYear() === dateB.getFullYear()
            && dateA.getMonth() === dateB.getMonth()
            && dateA.getDate() === dateB.getDate();
    }

    function renderDays() {
        const container = document.getElementById("daysContainer");
        container.innerHTML = "";

        for (let i = -2; i <= 3; i++) {
            const current = new Date(selectedDate);
            current.setDate(selectedDate.getDate() + i);

            const dayDiv = document.createElement("div");
            dayDiv.className = "day";

            if (isSameDay(current, selectedDate)) {
                dayDiv.classList.add("active");
            }

            dayDiv.innerHTML = `
                ${dayLabels[current.getDay()]}<br>
                <span>${current.getDate()}</span>
            `;

            dayDiv.addEventListener("click", () => {
                selectedDate = current;

                const url =
                    `recherche.html?from=${encodeURIComponent(from)}`
                    + `&to=${encodeURIComponent(to)}`
                    + `&date=${encodeURIComponent(formatDateForUrl(selectedDate))}`;

                window.location.href = url;
            });

            container.appendChild(dayDiv);
        }
    }

    function formatDate(value) {
        if (!value) return "-";

        const date = new Date(value);

        if (isNaN(date.getTime())) {
            return "-";
        }

        return date.toLocaleDateString("fr-FR");
    }

    function formatTime(value) {
        if (!value) return "-";

        const date = new Date(value);

        if (isNaN(date.getTime())) {
            return "-";
        }

        return date.toLocaleTimeString("fr-FR", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function showEmpty(title, message) {
        trainsList.innerHTML = `
            <div class="empty-state">
                <h3>${title}</h3>
                <p>${message}</p>
            </div>
        `;
    }

    async function loadTrips() {
        if (!from || !to) {
            trainCount.textContent = "Recherche incomplète";

            showEmpty(
                "Ville manquante",
                "Veuillez renseigner une ville de départ et une ville d’arrivée."
            );

            return;
        }

        /*
            Le backend actuel utilise surtout from/to.
            On garde la date dans l’URL pour l’affichage,
            mais la recherche API reste compatible avec le backend Java.
        */
        const url =
            `/trips/search?from=${encodeURIComponent(from)}`
            + `&to=${encodeURIComponent(to)}`;

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("Erreur API");
            }

            const trips = await response.json();

            trainCount.textContent =
                `${trips.length} train${trips.length > 1 ? "s" : ""} disponible${trips.length > 1 ? "s" : ""}`;

            trainsList.innerHTML = "";

            if (trips.length === 0) {
                showEmpty(
                    "Aucun train disponible",
                    "Aucun trajet ne correspond à votre recherche pour le moment."
                );
                return;
            }

            trips.forEach(trip => {
                const card = document.createElement("article");
                card.className = "train-card";

                card.innerHTML = `
                    <div class="train-info">
                        <h3>${trip.departure} → ${trip.destination}</h3>

                        <div class="train-route">
                            <div class="route-left">
                                <strong>${formatDate(trip.departureTime)}</strong>
                                <span>${formatTime(trip.departureTime)}</span>
                                <span>${trip.departure}</span>
                            </div>

                            <div class="route-line"></div>

                            <div class="route-right">
                                <strong>${formatDate(trip.arrivalTime)}</strong>
                                <span>${formatTime(trip.arrivalTime)}</span>
                                <span>${trip.destination}</span>
                            </div>
                        </div>

                        <div class="price-block">
                            <span>Prix</span>
                            <strong>${trip.price}€</strong>
                        </div>
                    </div>

                    <div class="train-action">
                        <button class="buy-btn">Acheter</button>
                    </div>
                `;

                const buyBtn = card.querySelector(".buy-btn");

                buyBtn.addEventListener("click", () => {
                    goToDetail(trip);
                });

                trainsList.appendChild(card);
            });

        } catch (error) {
            console.error(error);

            trainCount.textContent = "Erreur de chargement";

            showEmpty(
                "Impossible de charger les trajets",
                "Vérifiez que le serveur Spring Boot est bien lancé."
            );
        }
    }

    function goToDetail(trip) {
        const url =
            `detail.html?tripId=${encodeURIComponent(trip.id)}`
            + `&departure=${encodeURIComponent(trip.departure)}`
            + `&destination=${encodeURIComponent(trip.destination)}`
            + `&price=${encodeURIComponent(trip.price)}`
            + `&departureTime=${encodeURIComponent(trip.departureTime)}`
            + `&arrivalTime=${encodeURIComponent(trip.arrivalTime)}`
            + `&rank=${encodeURIComponent("Classe standard")}`;

        window.location.href = url;
    }

    document.getElementById("searchForm").addEventListener("submit", function (e) {
        e.preventDefault();

        from = fromField.value.trim();
        to = toField.value.trim();

        if (!from || !to) {
            showEmpty(
                "Ville manquante",
                "Veuillez renseigner une ville de départ et une ville d’arrivée."
            );
            return;
        }

        const url =
            `recherche.html?from=${encodeURIComponent(from)}`
            + `&to=${encodeURIComponent(to)}`
            + `&date=${encodeURIComponent(formatDateForUrl(selectedDate))}`;

        window.location.href = url;
    });

    document.getElementById("prevDaysBtn").addEventListener("click", () => {
        selectedDate.setDate(selectedDate.getDate() - 1);

        const url =
            `recherche.html?from=${encodeURIComponent(from)}`
            + `&to=${encodeURIComponent(to)}`
            + `&date=${encodeURIComponent(formatDateForUrl(selectedDate))}`;

        window.location.href = url;
    });

    document.getElementById("nextDaysBtn").addEventListener("click", () => {
        selectedDate.setDate(selectedDate.getDate() + 1);

        const url =
            `recherche.html?from=${encodeURIComponent(from)}`
            + `&to=${encodeURIComponent(to)}`
            + `&date=${encodeURIComponent(formatDateForUrl(selectedDate))}`;

        window.location.href = url;
    });

    updateDateLabel();
    renderDays();
    loadTrips();
</script>

</body>
</html>
