<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultat de recherche - TouTou</title>
    <link rel="stylesheet" href="recherche.css" />
</head>

<body>
<div class="search-page">

    <header class="topbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="TouTou Logo" />
        </a>

        <nav class="menu">
            <a href="index.html">ACCUEIL</a>
            <a href="mytickets.html">MES BILLETS</a>

            <a href="scanner.html" id="scannerLink" style="display:none;">
                SCANNER
            </a>

            <a href="admin.html" id="adminLink" style="display:none;">
                ADMIN
            </a>

            <a href="login.html" class="user-avatar" id="loginLink">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>
    </header>

    <main class="search-layout">

        <section class="left-panel">
            <h1>Résultat de recherche</h1>

            <div class="mini-search">
                <div class="mini-inputs fixed-search-summary">
                    <div class="summary-field">
                        <span id="fromField">Ville de départ</span>
                    </div>

                    <div class="summary-field">
                        <span id="toField">Ville d’arrivée</span>
                    </div>
                </div>

                <button id="searchAgainBtn">Chercher</button>
            </div>

            <div class="selected-date-label" id="selectedDateLabel">
                Date sélectionnée : -
            </div>

            <div class="days-selector">
                <button class="day-arrow" id="prevDaysBtn">‹</button>
                <div id="daysContainer" class="days-container"></div>
                <button class="day-arrow" id="nextDaysBtn">›</button>
            </div>
        </section>

        <section class="right-panel">

            <div class="right-header">
                <h2>Trains disponibles</h2>
                <span class="train-count">0 trains disponibles</span>
            </div>

            <div class="trains-list"></div>

        </section>

    </main>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const from = params.get("from");
    const to = params.get("to");
    const selectedDateParam = params.get("date");

    const fromField = document.getElementById("fromField");
    const toField = document.getElementById("toField");
    const selectedDateLabel = document.getElementById("selectedDateLabel");
    const trainCount = document.querySelector(".train-count");
    const tripsList = document.querySelector(".trains-list");

    fromField.textContent = from || "Ville de départ";
    toField.textContent = to || "Ville d’arrivée";

    function parseSelectedDate(dateStr) {
        if (!dateStr) return null;

        const parsed = new Date(dateStr);
        if (isNaN(parsed.getTime())) return null;

        parsed.setHours(0, 0, 0, 0);
        return parsed;
    }

    const selectedDate = parseSelectedDate(selectedDateParam) || (() => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return today;
    })();

    selectedDateLabel.textContent =
        `Date sélectionnée : ${selectedDate.toLocaleDateString("fr-FR", {
            weekday: "long",
            day: "2-digit",
            month: "long",
            year: "numeric"
        })}`;

    const dayLabels = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
    let dayOffset = -1;

    function isSameDay(dateA, dateB) {
        return dateA.getFullYear() === dateB.getFullYear()
            && dateA.getMonth() === dateB.getMonth()
            && dateA.getDate() === dateB.getDate();
    }

    function renderDays() {
        const container = document.getElementById("daysContainer");
        container.innerHTML = "";

        for (let i = 0; i < 6; i++) {
            const current = new Date(selectedDate);
            current.setDate(selectedDate.getDate() + dayOffset + i);

            const dayDiv = document.createElement("div");
            dayDiv.className = "day";

            if (isSameDay(current, selectedDate)) {
                dayDiv.classList.add("active");
            }

            dayDiv.innerHTML = `
            ${dayLabels[current.getDay()]}<br>
            <span>${current.getDate()}</span>
        `;

            dayDiv.addEventListener("click", () => {
                const newDate = current.toISOString().split("T")[0];
                const newUrl = `recherche.html?from=${encodeURIComponent(from || "")}&to=${encodeURIComponent(to || "")}&date=${encodeURIComponent(newDate)}`;
                window.location.href = newUrl;
            });

            container.appendChild(dayDiv);
        }
    }

    document.getElementById("prevDaysBtn").addEventListener("click", () => {
        dayOffset -= 1;
        renderDays();
    });

    document.getElementById("nextDaysBtn").addEventListener("click", () => {
        dayOffset += 1;
        renderDays();
    });

    document.getElementById("searchAgainBtn").addEventListener("click", () => {
        const currentDate = selectedDate.toISOString().split("T")[0];
        const newUrl = `index.html?from=${encodeURIComponent(from || "")}&to=${encodeURIComponent(to || "")}&date=${encodeURIComponent(currentDate)}`;
        window.location.href = newUrl;
    });

    async function loadTrips() {
        if (!from || !to) {
            trainCount.textContent = "Recherche incomplète";
            tripsList.innerHTML = `
            <div class="empty-state">
                <h3>Recherche incomplète</h3>
                <p>Veuillez renseigner une ville de départ et une ville d’arrivée.</p>
            </div>
        `;
            return;
        }

        try {
            const response = await fetch(
                `/trips/search?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`
            );

            if (!response.ok) {
                throw new Error("Erreur lors du chargement des trajets");
            }

            const trips = await response.json();
            tripsList.innerHTML = "";
            trainCount.textContent = `${trips.length} trains disponibles`;

            if (trips.length === 0) {
                tripsList.innerHTML = `
                <div class="empty-state">
                    <h3>Aucun train disponible</h3>
                    <p>Aucun trajet ne correspond à votre recherche pour le moment.</p>
                </div>
            `;
                return;
            }

            trips.forEach(trip => {
                const departureDate = new Date(trip.departureTime);
                const arrivalDate = new Date(trip.arrivalTime);

                const card = document.createElement("article");
                card.className = "train-card";

                card.innerHTML = `
                <div class="train-info">
                    <h3>${trip.departure} → ${trip.destination}</h3>

                    <div class="train-route">
                        <div class="route-left">
                            <strong>${departureDate.toLocaleDateString("fr-FR")}</strong>
                            <span>${departureDate.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}</span>
                            <span>${trip.departure}</span>
                        </div>

                        <div class="route-line"></div>

                        <div class="route-right">
                            <strong>${arrivalDate.toLocaleDateString("fr-FR")}</strong>
                            <span>${arrivalDate.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}</span>
                            <span>${trip.destination}</span>
                        </div>
                    </div>

                    <div class="price-block">
                        <span>Prix</span>
                        <strong>${trip.price}€</strong>
                    </div>
                </div>

                <div class="train-action">
                    <button class="buy-btn" onclick="goToDetail(
                        '${trip.id}',
                        '${trip.departure}',
                        '${trip.destination}',
                        '${trip.price}',
                        '${trip.departureTime}',
                        '${trip.arrivalTime}'
                    )">
                        Acheter
                    </button>
                </div>
            `;

                tripsList.appendChild(card);
            });

        } catch (err) {
            console.error(err);
            trainCount.textContent = "Erreur de chargement";
            tripsList.innerHTML = `
            <div class="empty-state">
                <h3>Impossible de charger les trajets</h3>
                <p>Veuillez réessayer plus tard.</p>
            </div>
        `;
        }
    }

    async function buyTicket(tripId) {
        try {
            const res = await fetch(`/tickets/buy?tripId=${tripId}`, {
                method: "POST"
            });

            if (!res.ok) {
                alert("Purchase failed");
                return;
            }

            alert("Ticket purchased!");
            window.location.href = "mytickets.html";

        } catch (err) {
            console.error(err);
            alert("Error buying ticket");
        }
    }

    renderDays();
    loadTrips();
    function goToDetail(tripId, departure, destination, price, departureTime, arrivalTime) {
        const url =
            `detail.html?tripId=${encodeURIComponent(tripId)}`
            + `&departure=${encodeURIComponent(departure)}`
            + `&destination=${encodeURIComponent(destination)}`
            + `&price=${encodeURIComponent(price)}`
            + `&departureTime=${encodeURIComponent(departureTime)}`
            + `&arrivalTime=${encodeURIComponent(arrivalTime)}`
            + `&rank=${encodeURIComponent("Classe standard")}`;

        window.location.href = url;
    }
</script>

<script src="app.js"></script>
</body>
</html>
