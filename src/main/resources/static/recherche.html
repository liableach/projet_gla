<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultat de recherche - TouTou</title>
    <link rel="stylesheet" href="recherche.css" />
</head>

<body>
<div class="search-page">

<header class="topbar">
    <a href="index.html" class="logo">
        <img src="assets/logo.png" />
    </a>

    <nav class="menu">
        <a href="index.html">ACCUEIL</a>
        <a href="mytickets.html">MES BILLETS</a>
        <a href="login.html" class="user-avatar">
            <img src="assets/client.png" />
        </a>
    </nav>
</header>

<main class="search-layout">

<section class="left-panel">

    <h1>Résultat de recherche</h1>

    <form id="searchForm" class="mini-search">
        <div class="mini-inputs">
            <input id="fromField" type="text" placeholder="Ville de départ" />
            <input id="toField" type="text" placeholder="Ville d’arrivée" />
        </div>
        <button type="submit">Rechercher</button>
    </form>

    <div id="selectedDateLabel">Date sélectionnée</div>

    <div class="days-selector">
        <button id="prevDaysBtn">‹</button>
        <div id="daysContainer"></div>
        <button id="nextDaysBtn">›</button>
    </div>

</section>

<section class="right-panel">

    <div class="right-header">
        <h2>Trains disponibles</h2>
        <span class="train-count">Chargement...</span>
    </div>

    <div id="trainsList"></div>

</section>

</main>
</div>

<script>
const params = new URLSearchParams(window.location.search);

let from = params.get("from") || "";
let to = params.get("to") || "";

const fromField = document.getElementById("fromField");
const toField = document.getElementById("toField");
const trainsList = document.getElementById("trainsList");
const trainCount = document.querySelector(".train-count");
const selectedDateLabel = document.getElementById("selectedDateLabel");

fromField.value = from;
toField.value = to;

function parseDate() {
    const raw = params.get("date") || params.get("depart");

    if (raw) {
        const [y, m, d] = raw.split("-");
        return new Date(y, m - 1, d);
    }

    const t = new Date();
    t.setHours(0,0,0,0);
    return t;
}

let selectedDate = parseDate();

function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,"0");
    const d = String(date.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
}

function updateLabel() {
    selectedDateLabel.textContent =
        "Date sélectionnée : " +
        selectedDate.toLocaleDateString("fr-FR");
}

function renderDays() {
    const container = document.getElementById("daysContainer");
    container.innerHTML = "";

    for (let i = -2; i <= 3; i++) {
        const d = new Date(selectedDate);
        d.setDate(d.getDate() + i);

        const div = document.createElement("div");
        div.className = "day";
        div.textContent = d.getDate();

        div.onclick = () => {
            selectedDate = d;
            updateLabel();
            loadTrips();
        };

        container.appendChild(div);
    }
}

function showEmpty(msg) {
    trainsList.innerHTML = `<p>${msg}</p>`;
}

async function loadTrips() {

    if (!from || !to) {
        showEmpty("Ville manquante");
        return;
    }

    const url =
        `/trips/search?from=${encodeURIComponent(from)}`
        + `&to=${encodeURIComponent(to)}`
        + `&date=${encodeURIComponent(formatDate(selectedDate))}`;

    console.log("API:", url);

    try {
        const res = await fetch(url);
        const trips = await res.json();

        trainCount.textContent = `${trips.length} résultat(s)`;
        trainsList.innerHTML = "";

        if (trips.length === 0) {
            showEmpty("Aucun trajet");
            return;
        }

        trips.forEach(t => {
            const div = document.createElement("div");
            div.className = "train-card";

            div.innerHTML = `
                <h3>${t.departure} → ${t.destination}</h3>
                <p>${t.price}€</p>
            `;

            trainsList.appendChild(div);
        });

    } catch (e) {
        console.error(e);
        showEmpty("Erreur API");
    }
}

document.getElementById("searchForm").onsubmit = (e) => {
    e.preventDefault();

    from = fromField.value;
    to = toField.value;

    const url =
        `recherche.html?from=${encodeURIComponent(from)}`
        + `&to=${encodeURIComponent(to)}`
        + `&date=${encodeURIComponent(formatDate(selectedDate))}`;

    window.location.href = url;
};

document.getElementById("prevDaysBtn").onclick = () => {
    selectedDate.setDate(selectedDate.getDate() - 1);
    updateLabel();
    renderDays();
    loadTrips();
};

document.getElementById("nextDaysBtn").onclick = () => {
    selectedDate.setDate(selectedDate.getDate() + 1);
    updateLabel();
    renderDays();
    loadTrips();
};

updateLabel();
renderDays();
loadTrips();

</script>

</body>
</html>
