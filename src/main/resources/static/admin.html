<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="page">

    <h1>Admin Panel</h1>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="usersTable">
        </tbody>

    </table>
    <h2>Create Trip</h2>

    <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:10px; max-width:400px;">

    <input id="departure" placeholder="Departure">
    <input id="destination" placeholder="Destination">
    <input id="price" type="number" placeholder="Price">

    <label>Departure time</label>
    <input id="departureTime" type="datetime-local">

    <label>Arrival time</label>
    <input id="arrivalTime" type="datetime-local">

    <button onclick="createTrip()">Create Trip</button>

</div>
</div>

<script>
requireAdmin();
async function loadUsers() {

    const response = await fetch('/admin/users');

    if (response.status === 401) {
        alert('Not logged in');
        return;
    }

    if (response.status === 403) {
        alert('Access denied');
        return;
    }

    const users = await response.json();

    const table = document.getElementById('usersTable');

    table.innerHTML = '';

    users.forEach(user => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${user.name}</td>
            <td>${user.email}</td>

            <td>
                <select id="role-${user.id}">
                    <option value="USER"
                        ${user.role === 'USER' ? 'selected' : ''}>
                        USER
                    </option>

                    <option value="CONDUCTOR"
                        ${user.role === 'CONDUCTOR' ? 'selected' : ''}>
                        CONDUCTOR
                    </option>

                    <option value="ADMIN"
                        ${user.role === 'ADMIN' ? 'selected' : ''}>
                        ADMIN
                    </option>
                </select>
            </td>

            <td>
                <button onclick="updateRole('${user.id}')">
                    Update
                </button>
            </td>
        `;

        table.appendChild(row);
    });
}

async function updateRole(userId) {

    const roleSelect =
        document.getElementById(`role-${userId}`);

    const role = roleSelect.value;

    const response = await fetch(
        `/admin/role?userId=${userId}&role=${role}`,
        {
            method: 'POST'
        }
    );

    const result = await response.text();

    alert(result);
}

loadUsers();
async function createTrip() {

    const trip = {
        departure: document.getElementById("departure").value,
        destination: document.getElementById("destination").value,
        price: parseInt(document.getElementById("price").value),

        departureTime: new Date(document.getElementById("departureTime").value).getTime(),
        arrivalTime: new Date(document.getElementById("arrivalTime").value).getTime()
    };

    const res = await fetch("/trips/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(trip)
    });

    if (res.ok) {
        alert("Trip created successfully");
        location.reload(); // refresh table if you want
    } else {
        alert("Failed to create trip");
    }
}
</script>
<script src="app.js"></script>
</body>
</html>
