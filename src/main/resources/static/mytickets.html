<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes billets</title>
    <link rel="stylesheet" href="mytickets.css">
</head>

<body>
<div class="tickets-page">

    <header class="topbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="TouTou Logo">
        </a>

        <nav class="menu">
            <a href="index.html">ACCUEIL</a>
            <a href="mytickets.html" class="active-link">MES BILLETS</a>

            <a href="scanner.html" id="scannerLink" style="display:none;">
                SCANNER
            </a>

            <a href="admin.html" id="adminLink" style="display:none;">
                ADMIN
            </a>

            <a href="login.html" class="user-avatar">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>
    </header>

    <div class="separator"></div>

    <main class="tickets-main">
        <section class="page-header">
            <div>
                <h1>Mes billets</h1>
                <p>Consultez les billets que vous avez déjà réservés ainsi que leur état actuel.</p>
            </div>
        </section>

        <div class="tickets-summary" id="ticketsSummary">Chargement des billets...</div>

        <section class="trains-list" id="ticketsList"></section>
    </main>
</div>

<script>
    requireAuth();

    function getStatusClass(status) {
        switch ((status || "").toUpperCase()) {
            case "VALID":
                return "status-valid";
            case "VALIDATED":
                return "status-used";
            case "EXPIRED":
                return "status-expired";
            case "CREATED":
                return "status-created";
            default:
                return "status-default";
        }
    }

    function formatStatus(status) {
        switch ((status || "").toUpperCase()) {
            case "VALID":
                return "Valide";
            case "VALIDATED":
                return "Validé";
            case "EXPIRED":
                return "Expiré";
            case "CREATED":
                return "Créé";
            default:
                return status || "Inconnu";
        }
    }

    async function loadTickets() {
        const summary = document.getElementById("ticketsSummary");
        const list = document.getElementById("ticketsList");

        try {
            const response = await fetch("/tickets");

            if (!response.ok) {
                throw new Error("Failed to load tickets");
            }

            const tickets = await response.json();

            summary.textContent = `${tickets.length} billet${tickets.length > 1 ? "s" : ""}`;

            list.innerHTML = "";

            if (tickets.length === 0) {
                list.innerHTML = `
                <div class="empty-state">
                    <h3>Aucun billet trouvé</h3>
                    <p>Vous n’avez pas encore réservé de billet.</p>
                </div>
            `;
                return;
            }

            tickets.forEach(ticket => {
                const dep = new Date(ticket.dateDeparture);
                const arr = new Date(ticket.dateArrival);

                const card = document.createElement("article");
                card.className = "train-card";

                card.innerHTML = `
                <div class="ticket-card-top">
                    <div>
                        <h3 class="ticket-route">
                            ${ticket.departure} → ${ticket.destination}
                        </h3>
                        <div class="ticket-subtitle">
                            ${ticket.trainName ? ticket.trainName : "Billet de train"}
                        </div>
                    </div>

                    <div class="status-badge ${getStatusClass(ticket.status)}">
                        ${formatStatus(ticket.status)}
                    </div>
                </div>

                <div class="train-route-block">
                    <div class="route-left">
                        <strong>${dep.toLocaleDateString()}</strong>
                        <span>${dep.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        <span>${ticket.departure}</span>
                    </div>

                    <div class="route-line"></div>

                    <div class="route-right">
                        <strong>${arr.toLocaleDateString()}</strong>
                        <span>${arr.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        <span>${ticket.destination}</span>
                    </div>
                </div>

                <div class="ticket-footer">
                    <div class="price-block">
                        <span>Prix</span>
                        <strong>${ticket.price}€</strong>
                    </div>

                    <div class="ticket-meta">
                        <div>
                            <span>État</span>
                            <p>${formatStatus(ticket.status)}</p>
                        </div>
                    </div>
                </div>
            `;

                list.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            summary.textContent = "Erreur de chargement";

            list.innerHTML = `
            <div class="empty-state">
                <h3>Impossible de charger les billets</h3>
                <p>Veuillez réessayer plus tard.</p>
            </div>
        `;
        }
    }

    loadTickets();
</script>

<script src="app.js"></script>
</body>
</html>
