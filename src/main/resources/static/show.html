<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes billets - TouTou</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f7f9fb;
            color: #1f2937;
        }

        /* HEADER */
        .navbar {
            height: 88px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: #ffffff;
        }

        .logo img {
            height: 52px;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 14px;
            color: #374151;
            font-weight: 500;
        }

        .nav-links a.active {
            color: #38bdf8;
            font-weight: 700;
        }

        .nav-links a.login-link {
            color: #38bdf8;
            font-weight: 600;
        }

        .separator {
            height: 1px;
            background: #e5e7eb;
        }

        /* PAGE */
        .page {
            max-width: 1300px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .page-header h1 {
            font-size: 34px;
            color: #111827;
        }

        .page-header p {
            color: #6b7280;
            margin-top: 6px;
            font-size: 15px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #38bdf8;
            color: white;
        }

        .btn-primary:hover {
            background: #1fb2f0;
        }

        .btn-light {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-light:hover {
            background: #f9fafb;
        }

        /* LAYOUT */
        .tickets-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
            border: 1px solid #eef2f7;
        }

        /* LEFT PANEL */
        .tickets-panel {
            padding: 20px;
        }

        .tickets-topbar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            height: 44px;
            border: 1px solid #dbe3ea;
            border-radius: 12px;
            padding: 0 14px;
            outline: none;
            font-size: 14px;
            background: #fbfdff;
        }

        .filter-select {
            height: 44px;
            border: 1px solid #dbe3ea;
            border-radius: 12px;
            padding: 0 12px;
            background: #fbfdff;
            font-size: 14px;
            color: #374151;
            outline: none;
        }

        .tickets-count {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 14px;
        }

        .tickets-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 720px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .ticket-card {
            border: 1px solid #e5eef5;
            border-radius: 18px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s ease;
            background: #fcfeff;
        }

        .ticket-card:hover {
            border-color: #8ddcfb;
            transform: translateY(-1px);
        }

        .ticket-card.active {
            border: 2px solid #38bdf8;
            background: #f0fbff;
        }

        .ticket-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ticket-route {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .ticket-train {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .status-badge {
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-valid {
            background: #dcfce7;
            color: #166534;
        }

        .status-used {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-expired {
            background: #fee2e2;
            color: #b91c1c;
        }

        .ticket-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 13px;
            color: #4b5563;
            margin-top: 10px;
        }

        .ticket-meta span {
            display: block;
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 4px;
        }

        /* RIGHT PANEL */
        .details-panel {
            padding: 26px;
            min-height: 500px;
        }

        .details-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .details-top h2 {
            font-size: 28px;
            color: #111827;
        }

        .details-top .small-ref {
            color: #6b7280;
            font-size: 14px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1.2fr 340px;
            gap: 24px;
            align-items: start;
        }

        .detail-box {
            background: #f9fbfd;
            border: 1px solid #e8eef5;
            border-radius: 18px;
            padding: 20px;
        }

        .main-trip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .city-block h3 {
            font-size: 30px;
            color: #111827;
        }

        .city-block p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }

        .trip-arrow {
            font-size: 28px;
            color: #38bdf8;
            font-weight: 700;
        }

        .detail-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 10px;
        }

        .detail-item {
            background: white;
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #edf2f7;
        }

        .detail-item .label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
        }

        .detail-item .value {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            line-height: 1.4;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .qr-card {
            width: 100%;
            background: #f0fbff;
            border: 2px solid #9bddf8;
            border-radius: 22px;
            padding: 22px;
            text-align: center;
        }

        .qr-card img {
            width: 210px;
            height: 210px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .qr-card p {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
        }

        .qr-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
        }

        .empty-state h3 {
            color: #374151;
            margin-bottom: 10px;
            font-size: 22px;
        }

        @media (max-width: 1050px) {
            .tickets-layout {
                grid-template-columns: 1fr;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .qr-section {
                align-items: stretch;
            }

            .qr-card img {
                width: 180px;
                height: 180px;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 0 18px;
            }

            .page {
                padding: 0 14px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .detail-list,
            .ticket-meta {
                grid-template-columns: 1fr;
            }

            .main-trip {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="../images/ui/logo.png" alt="TouTou logo">
        </a>
    </div>

    <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="recherche.html">Réserver</a>
        <a href="show.html" class="active">Mes billets</a>
        <a href="login.html" class="login-link">Se connecter / S’inscrire</a>
    </nav>
</header>

<div class="separator"></div>

<main class="page">
    <section class="page-header">
        <div>
            <h1>Mes billets</h1>
            <p>Consultez vos billets réservés, leur statut et leur QR code.</p>
        </div>

        <div class="header-actions">
            <button class="btn btn-light" onclick="window.location.href='index.html'">Retour à l’accueil</button>
            <button class="btn btn-primary" onclick="window.location.href='recherche.html'">Réserver un nouveau billet</button>
        </div>
    </section>

    <section class="tickets-layout">
        <!-- LEFT -->
        <div class="panel tickets-panel">
            <div class="tickets-topbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Rechercher une destination, un train, une date...">
                </div>

                <select id="statusFilter" class="filter-select">
                    <option value="all">Tous</option>
                    <option value="valid">Valides</option>
                    <option value="used">Validés</option>
                    <option value="expired">Expirés</option>
                </select>
            </div>

            <div class="tickets-count" id="ticketsCount">0 billet</div>
            <div class="tickets-list" id="ticketsList"></div>
        </div>

        <!-- RIGHT -->
        <div class="panel details-panel" id="detailsPanel">
            <div class="empty-state">
                <h3>Aucun billet sélectionné</h3>
                <p>Choisissez un billet dans la liste pour afficher ses détails.</p>
            </div>
        </div>
    </section>
</main>

<script>
    const tickets = [
        {
            id: "TKT-2026-001",
            route: "Paris → Lyon",
            from: "Paris",
            to: "Lyon",
            stationFrom: "Gare de Lyon",
            stationTo: "Lyon Part-Dieu",
            train: "Train 12430",
            date: "16 Nov 2026",
            departure: "08:15",
            arrival: "10:07",
            passenger: "John Woodspear",
            coach: "Voiture 5",
            seat: "Place 18A",
            price: "45 €",
            status: "valid",
            qr: "../images/ui/qr_sample.png"
        },
        {
            id: "TKT-2026-002",
            route: "Lille → Paris",
            from: "Lille",
            to: "Paris",
            stationFrom: "Lille Europe",
            stationTo: "Paris Nord",
            train: "Train 9802",
            date: "10 Nov 2026",
            departure: "18:40",
            arrival: "19:48",
            passenger: "John Woodspear",
            coach: "Voiture 2",
            seat: "Place 07C",
            price: "32 €",
            status: "used",
            qr: "../images/ui/qr_sample.png"
        },
        {
            id: "TKT-2026-003",
            route: "Marseille → Nice",
            from: "Marseille",
            to: "Nice",
            stationFrom: "Marseille Saint-Charles",
            stationTo: "Nice Ville",
            train: "Train 6175",
            date: "02 Nov 2026",
            departure: "09:20",
            arrival: "11:58",
            passenger: "John Woodspear",
            coach: "Voiture 9",
            seat: "Place 21D",
            price: "39 €",
            status: "expired",
            qr: "../images/ui/qr_sample.png"
        },
        {
            id: "TKT-2026-004",
            route: "Bordeaux → Toulouse",
            from: "Bordeaux",
            to: "Toulouse",
            stationFrom: "Bordeaux Saint-Jean",
            stationTo: "Toulouse Matabiau",
            train: "Train 8517",
            date: "20 Nov 2026",
            departure: "14:10",
            arrival: "16:35",
            passenger: "John Woodspear",
            coach: "Voiture 3",
            seat: "Place 12B",
            price: "41 €",
            status: "valid",
            qr: "../images/ui/qr_sample.png"
        }
    ];

    let selectedTicketId = tickets.length ? tickets[0].id : null;

    const ticketsList = document.getElementById("ticketsList");
    const detailsPanel = document.getElementById("detailsPanel");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const ticketsCount = document.getElementById("ticketsCount");

    function getStatusLabel(status) {
        switch (status) {
            case "valid": return "Valide";
            case "used": return "Validé";
            case "expired": return "Expiré";
            default: return "Inconnu";
        }
    }

    function getStatusClass(status) {
        switch (status) {
            case "valid": return "status-valid";
            case "used": return "status-used";
            case "expired": return "status-expired";
            default: return "";
        }
    }

    function renderTickets() {
        const query = searchInput.value.toLowerCase().trim();
        const filter = statusFilter.value;

        const filtered = tickets.filter(ticket => {
            const matchesSearch =
                ticket.route.toLowerCase().includes(query) ||
                ticket.train.toLowerCase().includes(query) ||
                ticket.date.toLowerCase().includes(query) ||
                ticket.id.toLowerCase().includes(query) ||
                ticket.from.toLowerCase().includes(query) ||
                ticket.to.toLowerCase().includes(query);

            const matchesFilter = filter === "all" || ticket.status === filter;
            return matchesSearch && matchesFilter;
        });

        ticketsCount.textContent = `${filtered.length} billet${filtered.length > 1 ? "s" : ""}`;

        if (!filtered.length) {
            ticketsList.innerHTML = `
          <div class="empty-state">
            <h3>Aucun billet trouvé</h3>
            <p>Essayez un autre mot-clé ou un autre filtre.</p>
          </div>
        `;
            detailsPanel.innerHTML = `
          <div class="empty-state">
            <h3>Aucun billet à afficher</h3>
            <p>La sélection s’affichera ici dès qu’un billet sera disponible.</p>
          </div>
        `;
            return;
        }

        if (!filtered.some(t => t.id === selectedTicketId)) {
            selectedTicketId = filtered[0].id;
        }

        ticketsList.innerHTML = filtered.map(ticket => `
        <div class="ticket-card ${ticket.id === selectedTicketId ? "active" : ""}" onclick="selectTicket('${ticket.id}')">
          <div class="ticket-card-top">
            <div>
              <div class="ticket-route">${ticket.route}</div>
              <div class="ticket-train">${ticket.train}</div>
            </div>
            <div class="status-badge ${getStatusClass(ticket.status)}">${getStatusLabel(ticket.status)}</div>
          </div>

          <div class="ticket-meta">
            <div>
              <span>Date</span>
              ${ticket.date}
            </div>
            <div>
              <span>Heure</span>
              ${ticket.departure} - ${ticket.arrival}
            </div>
            <div>
              <span>Passager</span>
              ${ticket.passenger}
            </div>
            <div>
              <span>Prix</span>
              ${ticket.price}
            </div>
          </div>
        </div>
      `).join("");

        const selected = filtered.find(t => t.id === selectedTicketId);
        renderDetails(selected);
    }

    function renderDetails(ticket) {
        if (!ticket) {
            detailsPanel.innerHTML = `
          <div class="empty-state">
            <h3>Aucun billet sélectionné</h3>
            <p>Choisissez un billet dans la liste pour afficher ses détails.</p>
          </div>
        `;
            return;
        }

        detailsPanel.innerHTML = `
        <div class="details-top">
          <div>
            <h2>Détail du billet</h2>
            <div class="small-ref">Référence : ${ticket.id}</div>
          </div>
          <div class="status-badge ${getStatusClass(ticket.status)}">${getStatusLabel(ticket.status)}</div>
        </div>

        <div class="details-grid">
          <div class="detail-box">
            <div class="main-trip">
              <div class="city-block">
                <h3>${ticket.from}</h3>
                <p>${ticket.stationFrom}</p>
              </div>

              <div class="trip-arrow">→</div>

              <div class="city-block">
                <h3>${ticket.to}</h3>
                <p>${ticket.stationTo}</p>
              </div>
            </div>

            <div class="detail-list">
              <div class="detail-item">
                <div class="label">Train</div>
                <div class="value">${ticket.train}</div>
              </div>

              <div class="detail-item">
                <div class="label">Date du voyage</div>
                <div class="value">${ticket.date}</div>
              </div>

              <div class="detail-item">
                <div class="label">Départ</div>
                <div class="value">${ticket.departure}</div>
              </div>

              <div class="detail-item">
                <div class="label">Arrivée</div>
                <div class="value">${ticket.arrival}</div>
              </div>

              <div class="detail-item">
                <div class="label">Passager</div>
                <div class="value">${ticket.passenger}</div>
              </div>

              <div class="detail-item">
                <div class="label">Prix</div>
                <div class="value">${ticket.price}</div>
              </div>

              <div class="detail-item">
                <div class="label">Voiture</div>
                <div class="value">${ticket.coach}</div>
              </div>

              <div class="detail-item">
                <div class="label">Place</div>
                <div class="value">${ticket.seat}</div>
              </div>
            </div>
          </div>

          <div class="qr-section">
            <div class="qr-card">
              <img src="${ticket.qr}" alt="QR code du billet">
              <p>Présentez ce QR code au contrôleur lors du contrôle du billet.</p>
            </div>

            <div class="qr-actions">
              <button class="btn btn-primary" onclick="downloadTicket('${ticket.id}')">Télécharger</button>
              <button class="btn btn-light" onclick="printTicket('${ticket.id}')">Imprimer</button>
              <button class="btn btn-light" onclick="window.location.href='detail.html'">Réserver à nouveau</button>
            </div>
          </div>
        </div>
      `;
    }

    function selectTicket(id) {
        selectedTicketId = id;
        renderTickets();
    }

    function downloadTicket(id) {
        alert("Téléchargement du billet " + id);
    }

    function printTicket(id) {
        alert("Impression du billet " + id);
    }

    searchInput.addEventListener("input", renderTickets);
    statusFilter.addEventListener("change", renderTickets);

    renderTickets();
</script>
</body>
</html>
