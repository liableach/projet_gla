<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - TouTou</title>
    <link rel="stylesheet" href="auth.css" />
</head>
<body>
<div class="auth-page">
    <div class="auth-overlay"></div>

    <header class="auth-navbar">
        <a href="index.html" class="auth-logo">
            <img src="assets/logo.png" alt="TouTou Logo" />
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h1>S’inscrire</h1>
            <p class="auth-subtitle">
                Créez votre compte pour réserver et consulter vos billets de train.
            </p>

            <form class="auth-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom complet" required />
                </div>

                <div class="form-group">
                    <label for="register-email">Adresse e-mail</label>
                    <input type="email" id="register-email" name="email" placeholder="Votre e-mail" required />
                </div>

                <div class="form-group">
                    <label for="register-password">Mot de passe</label>
                    <input type="password" id="register-password" name="password" placeholder="Choisir un mot de passe" required />
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirmer le mot de passe" required />
                </div>

                <button type="submit" class="auth-btn">Créer un compte</button>
            </form>

            <p class="auth-switch">
                Vous avez déjà un compte ?
                <a href="login.html">Se connecter</a>
            </p>
        </div>
    </main>
</div>
</body>
</html>
