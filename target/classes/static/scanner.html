<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scanner de billets</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f4f6;
            color: #173243;
        }

        .scanner-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scanner-header {
            height: 68px;
            background: #0f2d3a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
        }

        .scanner-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-link {
            color: #f7c948;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
        }

        .scanner-title {
            font-size: 18px;
            font-weight: 700;
        }

        .scanner-role {
            font-size: 13px;
            color: #b7d7e3;
        }

        .scanner-main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 18px 40px;
        }

        .scanner-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: white;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }

        .camera-panel {
            padding: 18px;
        }

        .camera-panel h2,
        .result-panel h2 {
            font-size: 22px;
            margin-bottom: 14px;
        }

        .camera-subtitle {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        #reader {
            width: 100%;
            overflow: hidden;
            border-radius: 14px;
        }

        .status-bar {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f8fafc;
            color: #475569;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }

        .result-panel {
            padding: 20px;
            min-height: 540px;
        }

        .result-placeholder {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
            padding: 18px 0;
        }

        .result-card {
            margin-top: 12px;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e5e7eb;
        }

        .result-success {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .result-error {
            background: #fef2f2;
            border-color: #fecaca;
        }

        .result-warning {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .result-success .result-title {
            color: #166534;
        }

        .result-error .result-title {
            color: #b91c1c;
        }

        .result-warning .result-title {
            color: #9a3412;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
            margin-top: 16px;
        }

        .result-item {
            background: rgba(255,255,255,0.75);
            border-radius: 12px;
            padding: 12px;
        }

        .result-item .label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .result-item .value {
            font-size: 15px;
            font-weight: 700;
            color: #173243;
            word-break: break-word;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #5ec4e8;
            color: white;
        }

        .btn-primary:hover {
            background: #43b8e1;
        }

        .btn-secondary {
            background: white;
            color: #5ec4e8;
            border: 2px solid #5ec4e8;
        }

        .btn-secondary:hover {
            background: #eefafd;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 45, 58, 0.55);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 18px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            position: relative;
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 12px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: #173243;
        }

        @media (max-width: 900px) {
            .scanner-main {
                padding: 18px 16px 28px;
            }

            .scanner-layout {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .camera-panel,
            .result-panel {
                width: 100%;
            }

            .result-panel {
                min-height: auto;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .actions .btn {
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .scanner-header {
                height: 64px;
                padding: 0 14px;
            }

            .scanner-header .left {
                gap: 10px;
            }

            .back-link {
                font-size: 20px;
            }

            .scanner-title {
                font-size: 16px;
            }

            .scanner-role {
                font-size: 12px;
            }

            .scanner-main {
                padding: 14px 12px 22px;
            }

            .panel {
                border-radius: 16px;
            }

            .camera-panel,
            .result-panel {
                padding: 14px;
            }

            .camera-panel h2,
            .result-panel h2 {
                font-size: 18px;
                margin-bottom: 10px;
            }

            .camera-subtitle {
                font-size: 13px;
                margin-bottom: 12px;
            }

            .status-bar {
                margin-top: 12px;
                padding: 10px 12px;
                font-size: 13px;
                border-radius: 10px;
            }

            .result-placeholder {
                font-size: 14px;
                padding: 12px 0;
            }

            .result-card {
                padding: 16px;
                border-radius: 14px;
            }

            .result-title {
                font-size: 18px;
                margin-bottom: 10px;
            }

            .result-item {
                padding: 10px;
            }

            .result-item .label {
                font-size: 11px;
            }

            .result-item .value {
                font-size: 14px;
            }

            .btn {
                width: 100%;
                padding: 11px 14px;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .scanner-main {
                padding: 12px 10px 18px;
            }

            .camera-panel,
            .result-panel {
                padding: 12px;
            }

            .scanner-title {
                font-size: 15px;
            }

            .scanner-role {
                font-size: 11px;
            }

            .camera-panel h2,
            .result-panel h2 {
                font-size: 17px;
            }

            .camera-subtitle,
            .result-placeholder,
            .status-bar {
                font-size: 12px;
            }

            .result-title {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
<div class="scanner-page">
    <header class="scanner-header">
        <div class="left">
            <a href="index.html" class="back-link">←</a>

            <div>
                <div class="scanner-title">Scanner de billets</div>
                <div class="scanner-role" id="userRoleLabel">
                    Vérification de l’accès...
                </div>
            </div>
        </div>
    </header>

    <main class="scanner-main">
        <div class="scanner-layout">

            <section class="panel camera-panel">
                <h2>Scan QR</h2>

                <p class="camera-subtitle">
                    Scannez le QR code du billet présenté par le voyageur pour vérifier sa validité.
                </p>

                <div id="reader"></div>

                <div class="status-bar" id="scanStatus">
                    Initialisation du scanner...
                </div>
            </section>

            <section class="panel result-panel">
                <h2>Résultat du contrôle</h2>

                <div id="resultArea" class="result-placeholder">
                    Aucun billet scanné pour le moment. Le résultat du contrôle s’affichera ici après la lecture d’un QR code.
                </div>
            </section>

        </div>
    </main>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal">
        <button class="close-modal" id="closeModalBtn">×</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    let scannerInstance = null;
    let scanLocked = false;

    const userRoleLabel = document.getElementById("userRoleLabel");
    const scanStatus = document.getElementById("scanStatus");
    const resultArea = document.getElementById("resultArea");
    const resultModal = document.getElementById("resultModal");
    const modalContent = document.getElementById("modalContent");
    const closeModalBtn = document.getElementById("closeModalBtn");

    function isMobileView() {
        return window.innerWidth <= 900;
    }

    function setStatus(message) {
        scanStatus.textContent = message;
    }

    function openModal(content) {
        modalContent.innerHTML = content;
        resultModal.classList.add("show");
    }

    function closeModal() {
        resultModal.classList.remove("show");
    }

    function displayResult(content) {
        if (isMobileView()) {
            openModal(content);
        } else {
            resultArea.innerHTML = content;
        }
    }

    function resetResultArea() {
        resultArea.innerHTML = `
            <div class="result-placeholder">
                Aucun billet scanné pour le moment. Le résultat du contrôle s’affichera ici après la lecture d’un QR code.
            </div>
        `;
    }

    function renderSuccess(ticketId, userId, message) {
        const content = `
            <div class="result-card result-success">
                <div class="result-title">Billet accepté</div>

                <p>
                    Le billet a été contrôlé par le serveur.
                </p>

                <div class="result-grid">
                    <div class="result-item">
                        <div class="label">Ticket ID</div>
                        <div class="value">${ticketId || "-"}</div>
                    </div>

                    <div class="result-item">
                        <div class="label">User ID</div>
                        <div class="value">${userId || "-"}</div>
                    </div>

                    <div class="result-item">
                        <div class="label">Réponse serveur</div>
                        <div class="value">${message || "-"}</div>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="restartScanner()">
                        Scanner à nouveau
                    </button>

                    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                        Retour accueil
                    </button>
                </div>
            </div>
        `;

        displayResult(content);
    }

    function renderError(title, message) {
        const content = `
            <div class="result-card result-error">
                <div class="result-title">${title}</div>

                <p>${message}</p>

                <div class="actions">
                    <button class="btn btn-primary" onclick="restartScanner()">
                        Réessayer
                    </button>

                    <button class="btn btn-secondary" onclick="closeModal()">
                        Fermer
                    </button>
                </div>
            </div>
        `;

        displayResult(content);
    }

    function renderWarning(title, message) {
        const content = `
            <div class="result-card result-warning">
                <div class="result-title">${title}</div>

                <p>${message}</p>

                <div class="actions">
                    <button class="btn btn-primary" onclick="restartScanner()">
                        Scanner à nouveau
                    </button>

                    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                        Retour accueil
                    </button>
                </div>
            </div>
        `;

        displayResult(content);
    }

    function restartScanner() {
        scanLocked = false;
        closeModal();
        resetResultArea();
        setStatus("Scanner prêt. Présentez un billet.");
    }

    function parseQrContent(decodedText) {
        const parts = decodedText.split(":");

        if (parts.length !== 2) {
            return null;
        }

        return {
            ticketId: parts[0],
            userId: parts[1]
        };
    }

    async function checkAccess() {
        const response = await fetch("/me");

        if (response.status === 401) {
            alert("Vous devez vous connecter.");
            window.location.href = "login.html";
            return null;
        }

        if (!response.ok) {
            throw new Error("Impossible de vérifier l’utilisateur connecté.");
        }

        const user = await response.json();

        userRoleLabel.textContent = `Utilisateur connecté : ${user.role}`;

        if (user.role !== "ADMIN" && user.role !== "CONDUCTOR") {
            alert("Accès refusé. Cette page est réservée aux contrôleurs.");
            window.location.href = "index.html";
            return null;
        }

        return user;
    }

    async function sendScanRequest(ticketId, userId) {
        const url =
            `/scan?ticketId=${encodeURIComponent(ticketId)}`
            + `&userId=${encodeURIComponent(userId)}`;

        const response = await fetch(url, {
            method: "POST"
        });

        const text = await response.text();

        if (response.status === 401) {
            window.location.href = "login.html";
            return;
        }

        if (response.status === 403) {
            renderError(
                "Accès refusé",
                "Votre rôle ne permet pas de scanner des billets."
            );
            setStatus("Accès refusé.");
            return;
        }

        if (!response.ok) {
            renderError(
                "Billet refusé",
                text || "Le billet est invalide ou inexistant."
            );
            setStatus("Le contrôle a échoué.");
            return;
        }

        if (text.toUpperCase().includes("ALREADY")) {
            renderWarning(
                "Billet déjà validé",
                text
            );
            setStatus("Billet déjà contrôlé.");
            return;
        }

        renderSuccess(ticketId, userId, text);
        setStatus("Billet contrôlé avec succès.");
    }

    function onScanSuccess(decodedText) {
        if (scanLocked) {
            return;
        }

        scanLocked = true;

        setStatus("QR détecté. Vérification du billet...");

        const qrData = parseQrContent(decodedText);

        if (!qrData) {
            renderError(
                "QR invalide",
                "Le format du QR code n’est pas reconnu. Format attendu : ticketId:userId."
            );

            setStatus("Erreur de lecture du QR code.");
            return;
        }

        sendScanRequest(qrData.ticketId, qrData.userId);
    }

    async function initScanner() {
        try {
            const user = await checkAccess();

            if (!user) {
                return;
            }

            scannerInstance = new Html5QrcodeScanner(
                "reader",
                {
                    fps: 10,
                    qrbox: 250
                }
            );

            scannerInstance.render(onScanSuccess);

            setStatus("Scanner prêt. Présentez un billet.");

        } catch (error) {
            console.error(error);

            renderError(
                "Erreur d’accès",
                "Impossible d’initialiser le scanner."
            );

            setStatus("Erreur lors de l’initialisation.");
        }
    }

    closeModalBtn.addEventListener("click", closeModal);

    initScanner();
</script>

</body>
</html>
