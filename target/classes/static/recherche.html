<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultat de recherche - TouTou</title>
    <link rel="stylesheet" href="recherche.css" />
</head>

<body>
<div class="search-page">

    <header class="topbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="TouTou Logo" />
        </a>

        <nav class="menu">
            <a href="index.html">ACCUEIL</a>
            <a href="mytickets.html">MES BILLETS</a>

            <a href="login.html" class="user-avatar">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>
    </header>

    <main class="search-layout">

        <section class="left-panel">
            <h1>Résultat de recherche</h1>

            <div class="mini-search">
                <div class="mini-inputs fixed-search-summary">
                    <div class="summary-field">
                        <span id="fromField">Ville de départ</span>
                    </div>

                    <div class="summary-field">
                        <span id="toField">Ville d’arrivée</span>
                    </div>
                </div>

                <button id="searchAgainBtn">Modifier</button>
            </div>

            <div class="selected-date-label" id="selectedDateLabel">
                Date sélectionnée : -
            </div>

            <div class="days-selector">
                <button class="day-arrow" id="prevDaysBtn">‹</button>
                <div id="daysContainer" class="days-container"></div>
                <button class="day-arrow" id="nextDaysBtn">›</button>
            </div>
        </section>

        <section class="right-panel">

            <div class="right-header">
                <h2>Trains disponibles</h2>
                <span class="train-count">Chargement...</span>
            </div>

            <div class="trains-list" id="trainsList"></div>

        </section>

    </main>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const from = params.get("from");
    const to = params.get("to");

    const fromField = document.getElementById("fromField");
    const toField = document.getElementById("toField");
    const selectedDateLabel = document.getElementById("selectedDateLabel");
    const trainCount = document.querySelector(".train-count");
    const trainsList = document.getElementById("trainsList");
    const searchAgainBtn = document.getElementById("searchAgainBtn");

    fromField.textContent = from || "Ville de départ";
    toField.textContent = to || "Ville d’arrivée";

    function getSelectedDate() {
        const rawDate = params.get("depart") || params.get("date");

        if (rawDate) {
            const parsedDate = new Date(rawDate);

            if (!isNaN(parsedDate.getTime())) {
                parsedDate.setHours(0, 0, 0, 0);
                return parsedDate;
            }
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return today;
    }

    const selectedDate = getSelectedDate();

    selectedDateLabel.textContent =
        "Date sélectionnée : " +
        selectedDate.toLocaleDateString("fr-FR", {
            weekday: "long",
            day: "2-digit",
            month: "long",
            year: "numeric"
        });

    searchAgainBtn.addEventListener("click", () => {
        window.location.href = "index.html";
    });

    function formatDateTime(value) {
        const date = new Date(value);

        if (isNaN(date.getTime())) {
            return {
                date: "-",
                time: "-"
            };
        }

        return {
            date: date.toLocaleDateString("fr-FR"),
            time: date.toLocaleTimeString("fr-FR", {
                hour: "2-digit",
                minute: "2-digit"
            })
        };
    }

    function showEmptyState(title, message) {
        trainsList.innerHTML = `
            <div class="empty-state">
                <h3>${title}</h3>
                <p>${message}</p>
            </div>
        `;
    }

    const dayLabels = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
    let dayOffset = -1;

    function isSameDay(dateA, dateB) {
        return dateA.getFullYear() === dateB.getFullYear()
            && dateA.getMonth() === dateB.getMonth()
            && dateA.getDate() === dateB.getDate();
    }

    function formatDateForUrl(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
    }

    function renderDays() {
        const container = document.getElementById("daysContainer");
        container.innerHTML = "";

        for (let i = 0; i < 6; i++) {
            const current = new Date(selectedDate);
            current.setDate(selectedDate.getDate() + dayOffset + i);

            const dayDiv = document.createElement("div");
            dayDiv.className = "day";

            if (isSameDay(current, selectedDate)) {
                dayDiv.classList.add("active");
            }

            dayDiv.innerHTML = `
                ${dayLabels[current.getDay()]}<br>
                <span>${current.getDate()}</span>
            `;

            dayDiv.addEventListener("click", () => {
                const newDate = formatDateForUrl(current);

                const newUrl =
                    `recherche.html?from=${encodeURIComponent(from || "")}`
                    + `&to=${encodeURIComponent(to || "")}`
                    + `&date=${encodeURIComponent(newDate)}`;

                window.location.href = newUrl;
            });

            container.appendChild(dayDiv);
        }
    }

    document.getElementById("prevDaysBtn").addEventListener("click", () => {
        dayOffset -= 1;
        renderDays();
    });

    document.getElementById("nextDaysBtn").addEventListener("click", () => {
        dayOffset += 1;
        renderDays();
    });

    async function loadTrips() {
        if (!from || !to) {
            trainCount.textContent = "Recherche incomplète";
            showEmptyState(
                "Recherche incomplète",
                "Veuillez renseigner une ville de départ et une ville d’arrivée."
            );
            return;
        }

        try {
            const url =
                `/trips/search?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("Erreur API");
            }

            const trips = await response.json();

            trainsList.innerHTML = "";
            trainCount.textContent = `${trips.length} train(s) disponible(s)`;

            if (trips.length === 0) {
                showEmptyState(
                    "Aucun train disponible",
                    "Aucun trajet ne correspond à votre recherche pour le moment."
                );
                return;
            }

            trips.forEach(trip => {
                const departure = formatDateTime(trip.departureTime);
                const arrival = formatDateTime(trip.arrivalTime);

                const card = document.createElement("article");
                card.className = "train-card";

                card.innerHTML = `
                    <div class="train-info">
                        <h3>${trip.departure} → ${trip.destination}</h3>

                        <div class="train-route">
                            <div class="route-left">
                                <strong>${departure.date}</strong>
                                <span>${departure.time}</span>
                                <span>${trip.departure}</span>
                            </div>

                            <div class="route-line"></div>

                            <div class="route-right">
                                <strong>${arrival.date}</strong>
                                <span>${arrival.time}</span>
                                <span>${trip.destination}</span>
                            </div>
                        </div>

                        <div class="price-block">
                            <span>Prix</span>
                            <strong>${trip.price}€</strong>
                        </div>
                    </div>

                    <div class="train-action">
                        <button class="buy-btn">Acheter</button>
                    </div>
                `;

                const buyBtn = card.querySelector(".buy-btn");

                buyBtn.addEventListener("click", () => {
                    goToDetail(trip);
                });

                trainsList.appendChild(card);
            });

        } catch (error) {
            console.error(error);

            trainCount.textContent = "Erreur de chargement";
            showEmptyState(
                "Impossible de charger les trajets",
                "Vérifiez que le serveur Spring Boot est bien lancé."
            );
        }
    }

    function goToDetail(trip) {
        const url =
            `detail.html?tripId=${encodeURIComponent(trip.id)}`
            + `&departure=${encodeURIComponent(trip.departure)}`
            + `&destination=${encodeURIComponent(trip.destination)}`
            + `&price=${encodeURIComponent(trip.price)}`
            + `&departureTime=${encodeURIComponent(trip.departureTime)}`
            + `&arrivalTime=${encodeURIComponent(trip.arrivalTime)}`;

        window.location.href = url;
    }

    renderDays();
    loadTrips();
</script>

</body>
</html>
