<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TouTou - Accueil</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="page">
    <div class="overlay"></div>

    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="TouTou Logo" />
        </a>

        <nav class="menu">
            <a href="index.html" class="active-link">ACCUEIL</a>
            <a href="mytickets.html">MES BILLETS</a>

            <a href="login.html" class="user-avatar">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>
    </header>

    <main class="hero">
        <section class="hero-text">
            <h1>
                <span class="small-title">Stop looking,</span><br />
                <span class="big-title">Start booking !</span>
            </h1>

            <p>
                Explorez notre site de réservation de billets de train captivant,
                où chaque clic vous transporte vers une aventure ferroviaire inoubliable.
            </p>

            <form class="search-card" action="recherche.html" method="get">
                <h2>Chercher votre trajet</h2>

                <div class="row row-top">
                    <input
                            type="text"
                            name="from"
                            placeholder="De:"
                            required
                    />

                    <input
                            type="text"
                            name="to"
                            placeholder="À:"
                            required
                    />
                </div>

                <div class="row row-bottom">
                    <div class="field-group">
                        <label for="depart">Date de départ:</label>
                        <input
                                type="date"
                                id="depart"
                                name="depart"
                        />
                    </div>

                    <div class="field-group">
                        <label for="retour">Date de retour:</label>
                        <input
                                type="date"
                                id="retour"
                                name="retour"
                        />
                    </div>

                    <div class="field-group small">
                        <label for="passengers">Passagers:</label>
                        <input
                                type="number"
                                id="passengers"
                                name="passengers"
                                value="1"
                                min="1"
                        />
                    </div>
                </div>

                <div class="search-btn-wrapper">
                    <button type="submit">Chercher</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
