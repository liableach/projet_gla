<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes billets</title>
    <link rel="stylesheet" href="recherche.css">
</head>

<body>

<div class="search-page">

    <header class="topbar">

        <a href="index.html" class="logo">
            <img src="assets/logo.png">
        </a>
        <nav class="menu">
            <a href="index.html">ACCUEIL</a>
            <a href="mytickets.html">MES BILLETS</a>

            <a href="scanner.html" id="scannerLink" style="display:none;">
                SCANNER
            </a>

            <a href="admin.html" id="adminLink" style="display:none;">
                ADMIN
            </a>

            <a href="login.html" class="user-avatar">
                <img src="assets/client.png" alt="Profil utilisateur" />
            </a>
        </nav>

    </header>

    <main style="padding:40px;">

        <h1 style="margin-bottom:30px;">
            Mes billets
        </h1>

        <div class="trains-list" id="ticketsList">
        </div>

    </main>

</div>

<script>
    requireAuth();
    async function loadTickets() {

        const response = await fetch("/tickets");

        if (!response.ok) {

            alert("Failed to load tickets");
            return;
        }

        const tickets = await response.json();

        const list =
            document.getElementById("ticketsList");

        list.innerHTML = "";

        tickets.forEach(ticket => {

            const dep =
                new Date(ticket.dateDeparture);

            const arr =
                new Date(ticket.dateArrival);

            const card =
                document.createElement("article");

            card.className = "train-card";

            card.innerHTML = `

            <div class="train-info">

                <h3>
                    ${ticket.departure}
                    →
                    ${ticket.destination}
                </h3>

                <div class="train-route">

                    <div class="route-left">

                        <strong>
                            ${dep.toLocaleDateString()}
                        </strong>

                        <span>
                            ${dep.toLocaleTimeString()}
                        </span>

                    </div>

                    <div class="route-line"></div>

                    <div class="route-right">

                        <strong>
                            ${arr.toLocaleDateString()}
                        </strong>

                        <span>
                            ${arr.toLocaleTimeString()}
                        </span>

                    </div>

                </div>

                <div class="price-block">

                    <span>Prix</span>

                    <strong>
                        ${ticket.price}€
                    </strong>

                </div>

                <div style="margin-top:15px;">

                    <strong>
                       Etat:
                    </strong>

                    <span>
                        ${ticket.status}
                    </span>

                </div>

            </div>
        `;

            list.appendChild(card);
        });
    }

    loadTickets();

</script>
<script src="app.js"></script>
</body>
</html>
